name: Deploy Applications

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
  workflow_dispatch:

env:
  AZURE_SUBSCRIPTION_ID: \${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: \${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR name
        id: acr
        run: |
          ACR_NAME=\$(az acr list --query ".name" -o tsv)
          echo "name=\$ACR_NAME" >> \$GITHUB_OUTPUT
          echo "login_server=\$ACR_NAME.azurecr.io" >> \$GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name \${{ steps.acr.outputs.name }}

      - name: Build and Push API
        working-directory: ./apps/api
        run: |
          docker build -t \${{ steps.acr.outputs.login_server }}/sms-api:\${{ github.sha }} .
          docker tag \${{ steps.acr.outputs.login_server }}/sms-api:\${{ github.sha }} \${{ steps.acr.outputs.login_server }}/sms-api:latest
          docker push \${{ steps.acr.outputs.login_server }}/sms-api:\${{ github.sha }}
          docker push \${{ steps.acr.outputs.login_server }}/sms-api:latest

      - name: Build and Push Web
        working-directory: ./apps/web
        run: |
          docker build -t \${{ steps.acr.outputs.login_server }}/sms-web:\${{ github.sha }} .
          docker tag \${{ steps.acr.outputs.login_server }}/sms-web:\${{ github.sha }} \${{ steps.acr.outputs.login_server }}/sms-web:latest
          docker push \${{ steps.acr.outputs.login_server }}/sms-web:\${{ github.sha }}
          docker push \${{ steps.acr.outputs.login_server }}/sms-web:latest

      - name: Build and Push Worker
        working-directory: ./apps/worker
        run: |
          docker build -t \${{ steps.acr.outputs.login_server }}/sms-worker:\${{ github.sha }} .
          docker tag \${{ steps.acr.outputs.login_server }}/sms-worker:\${{ github.sha }} \${{ steps.acr.outputs.login_server }}/sms-worker:latest
          docker push \${{ steps.acr.outputs.login_server }}/sms-worker:\${{ github.sha }}
          docker push \${{ steps.acr.outputs.login_server }}/sms-worker:latest

      - name: Update Container Apps
        run: |
          RG_NAME=\$(az group list --query "[?contains(name, 'sms')].name" -o tsv | head -1)
          
          az containerapp update \
            --name ca-sms-api-dev \
            --resource-group \$RG_NAME \
            --image \${{ steps.acr.outputs.login_server }}/sms-api:latest
          
          az containerapp update \
            --name ca-sms-web-dev \
            --resource-group \$RG_NAME \
            --image \${{ steps.acr.outputs.login_server }}/sms-web:latest
          
          az containerapp update \
            --name ca-sms-worker-dev \
            --resource-group \$RG_NAME \
            --image \${{ steps.acr.outputs.login_server }}/sms-worker:latest
